# MCPGate — zero-config local deployment
# ────────────────────────────────────────────────────────────────────────
#
# Quick start:
#   export ADMIN_API_KEY=$(python3 -c "import secrets; print(secrets.token_hex(32))")
#   docker compose up -d
#   curl http://localhost:8000/health
#
# To pin a specific MCPGate version (defaults to latest):
#   export MCPGATE_VERSION=1.2.3
#
# ────────────────────────────────────────────────────────────────────────

services:
  mcpgate:
    image: ghcr.io/gatesuite/mcpgate:${MCPGATE_VERSION:-latest}
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://mcpgate:mcpgate@postgres:5432/mcpgate
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me-in-production-this-is-insecure}
      KEY_PREFIX: ${KEY_PREFIX:-mcp_sk_}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcpgate
      POSTGRES_PASSWORD: mcpgate
      POSTGRES_DB: mcpgate
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpgate"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
