services:
  mcpgate:
    image: ghcr.io/gatesuite/mcpgate:0.3.0 # x-release-please-version
    build:
      context: ../..
      dockerfile: Dockerfile
      target: production
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://mcpgate:mcpgate@postgres:5432/mcpgate
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcpgate
      POSTGRES_PASSWORD: mcpgate
      POSTGRES_DB: mcpgate
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcpgate"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
