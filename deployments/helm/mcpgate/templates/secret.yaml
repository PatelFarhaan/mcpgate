{{/*
  MCPGate requires an externally managed K8s Secret for all sensitive values.
  The secret must be created before installing the chart.

  Required keys in the secret:
    - DATABASE_URL      (PostgreSQL connection string)
    - ADMIN_API_KEY     (Master token for creating/revoking keys)

  Example:
    kubectl create secret generic mcpgate-secrets \
      --from-literal=DATABASE_URL="postgresql+asyncpg://user:pass@host:5432/mcpgate" \
      --from-literal=ADMIN_API_KEY="$(openssl rand -base64 32)"

  Then set: existingSecret: mcpgate-secrets
*/}}
{{- if not .Values.existingSecret }}
{{- fail "\n\nexistingSecret is required. Create a K8s Secret with your credentials first:\n\n  kubectl create secret generic mcpgate-secrets \\\n    --from-literal=DATABASE_URL=\"postgresql+asyncpg://user:pass@host:5432/mcpgate\" \\\n    --from-literal=ADMIN_API_KEY=\"$(openssl rand -base64 32)\"\n\nThen set: --set existingSecret=mcpgate-secrets\n" }}
{{- end }}
