apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcpgate.fullname" . }}
  labels:
    {{- include "mcpgate.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "mcpgate.selectorLabels" . | nindent 4 }}
